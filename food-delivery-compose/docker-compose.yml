version: '3.8'

services:

  config-server:
    image: config-server
    ports:
      - "8888:8888"

  user-service:
    image: user-service
    ports:
      - "8081:8080"
    depends_on:
      - config-server

  restaurant-service:
    image: restaurant-service
    ports:
      - "8082:8080"
    depends_on:
      - config-server

  order-service:
    image: order-service
    ports:
      - "8083:8080"
    depends_on:
      - config-server

  api-gateway:
    image: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - restaurant-service
      - order-service
      - config-server