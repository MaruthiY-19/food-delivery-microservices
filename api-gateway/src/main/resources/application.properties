spring.application.name=api-gateway
spring.config.import=optional:configserver:http://host.docker.internal:8888

# USER SERVICE
spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://host.docker.internal:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/users/**

# RESTAURANT SERVICE
spring.cloud.gateway.server.webflux.routes[1].id=restaurant-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://host.docker.internal:8082
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/restaurants/**

# ORDER SERVICE
spring.cloud.gateway.server.webflux.routes[2].id=order-service
spring.cloud.gateway.server.webflux.routes[2].uri=http://host.docker.internal:8083
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/orders/**

server.port=8080